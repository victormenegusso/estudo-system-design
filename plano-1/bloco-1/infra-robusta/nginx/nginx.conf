# ─── Rate Limiting Zone ────────────────────────────────────────────────────────
# Define uma zona de memória compartilhada chamada "api_limit".
# Chave: $binary_remote_addr (IP do cliente, em formato binário — menor que $remote_addr).
# Tamanho: 10m (~160.000 endereços IP únicos).
# Taxa: 100 req/s por IP. Acima disso, Nginx retornará 429.
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;

# ─── Upstream (Backend Pool) ────────────────────────────────────────────────────
# Define o grupo de servidores que receberão as requisições balanceadas.
# Algoritmo padrão: round-robin (alterna entre app-1 e app-2).
upstream app_backend {
    server app-1:8080 max_fails=3 fail_timeout=30s;
    # max_fails=3:      após 3 falhas consecutivas, marca o servidor como "indisponível"
    # fail_timeout=30s: fica indisponível por 30s antes de tentar novamente (health check passivo)
    server app-2:8080 max_fails=3 fail_timeout=30s;

    keepalive 32;
    # Mantém até 32 conexões keepalive abertas com os backends.
    # Evita overhead de TCP handshake a cada request.
}

# ─── Server Block ───────────────────────────────────────────────────────────────
server {
    listen 8080;
    server_name localhost;

    # ── Rate Limiting ──────────────────────────────────────────────────────────
    # Aplica a zona "api_limit" em todas as rotas.
    # burst=50:    permite uma rajada de até 50 requests acima do limite (enfileirados).
    # nodelay:     não enfileira — rejeita imediatamente com 429 se exceder o burst.
    limit_req zone=api_limit burst=50 nodelay;
    limit_req_status 429;

    # ── Proxy para o Backend ───────────────────────────────────────────────────
    location / {
        proxy_pass http://app_backend;

        # Cabeçalhos padrão de proxy reverso
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # ── Circuit Breaker Passivo ────────────────────────────────────────────
        # Se app-1 retornar erro, timeout ou 5xx, Nginx tenta app-2 automaticamente.
        # Isso é o "Circuit Breaker passivo": não conta erros globalmente, mas
        # redireciona a requisição atual para o próximo servidor disponível.
        proxy_next_upstream error timeout http_500 http_502 http_503 http_504;
        proxy_next_upstream_tries 2;
        # Limita a 2 tentativas (evita loop infinito se ambas estiverem falhando)

        # ── Timeouts ──────────────────────────────────────────────────────────
        proxy_connect_timeout   5s;
        proxy_send_timeout     30s;
        proxy_read_timeout     30s;

        # ── Header de Diagnóstico ──────────────────────────────────────────────
        # Expõe qual instância do backend respondeu a requisição.
        # Útil para verificar distribuição de carga no K6 e no browser.
        # Exemplo: X-Served-By: 172.18.0.3:8080 (será o IP interno do container)
        add_header X-Served-By $upstream_addr always;
    }

    # ── Endpoint de Status do Nginx ────────────────────────────────────────────
    # Expõe métricas básicas do Nginx (conexões ativas, requests etc.).
    # Disponível em: http://localhost:8080/nginx_status (interno apenas)
    location /nginx_status {
        stub_status;
        allow 127.0.0.1;
        allow 172.0.0.0/8; # rede interna Docker
        deny all;
    }
}
