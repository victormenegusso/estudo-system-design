
# Conexão com o Banco de Dados
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:5432/ingressos
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.jpa.hibernate.ddl-auto=none
spring.flyway.enabled=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Configurações de Concurrência (Pool de Conexões - HikariCP)
# Para alta escala, o pool não deve ser nem muito grande (overhead) nem insuficiente.
spring.datasource.hikari.maximum-pool-size=${HIKARI_MAX_POOL:10}
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=5000

# Configurações do Tomcat (Simulando gargalo com threads > pool simulado)
server.tomcat.threads.max=${TOMCAT_MAX_THREADS:200}
server.tomcat.threads.min-spare=20
server.tomcat.accept-count=500
server.tomcat.mbeanregistry.enabled=true

# Actuator (Observabilidade)
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.metrics.distribution.percentiles-histogram.http.server.requests=true
management.metrics.export.prometheus.enabled=true

# Logs simples
logging.level.root=INFO
logging.level.com.example.ingressos=DEBUG
